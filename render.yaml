databases:
  - name: docmind-db
    databaseName: docmind
    user: docmind_user
    plan: free

services:
  - type: web
    name: docmind-backend
    env: docker
    dockerFilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: docmind-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
